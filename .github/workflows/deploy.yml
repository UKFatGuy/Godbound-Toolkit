# CI/CD: Build Docker image → push to GHCR → deploy to server via SSH
#
# Required repository secrets:
#   DEPLOY_HOST     - hostname or IP address of the target server
#   DEPLOY_USER     - SSH username on the target server
#   DEPLOY_SSH_KEY  - private SSH key (ed25519 recommended) authorised on the server
#   DEPLOY_PATH     - absolute path on the server containing docker-compose.yml
#                     (e.g. /opt/godbound-toolkit)
#
# Optional repository secrets:
#   DEPLOY_PORT     - SSH port (defaults to 22 when omitted)

name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ukfatguy/godbound-toolkit

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # :latest on main branch pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # :sha-<full-sha> for traceability on every build
            type=raw,value=sha-${{ github.sha }}
            # :<git-tag> for version tag builds (e.g. v1.2.3)
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        # Requires secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
        # Optional secret:  DEPLOY_PORT (defaults to 22)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
