# CI: validate that dependencies install cleanly and the server starts
#
# This workflow is required to pass on all pull requests targeting main.
# Combined with CODEOWNERS, it ensures nothing lands on main without
# both a green check AND the owner's explicit approval.
#
# Knobs
# -----
# NODE_VERSION         – Node.js version installed by setup-node (env var below).
#                        Kept in sync with the FROM node:xx-alpine line in Dockerfile.
# READY_TIMEOUT_SECONDS – seconds the smoke test will wait for the server to respond
#                        before declaring failure.  Override at the job level or as a
#                        repository/environment variable if your runner is slow.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # Pin the Node.js version.  Match the major version used in the Dockerfile
  # (FROM node:20-alpine).  Update both together when upgrading.
  NODE_VERSION: "20.x"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for known vulnerabilities
        run: npm audit --audit-level=high

      - name: Verify server starts and exits cleanly
        # Start the server, poll until it responds (or timeout), then shut it
        # down cleanly.  Catches missing-module errors and startup crashes.
        #
        # READY_TIMEOUT_SECONDS can be overridden via a repository/environment
        # variable or by editing the default value below.
        env:
          READY_TIMEOUT_SECONDS: ${{ vars.READY_TIMEOUT_SECONDS || 60 }}
        run: |
          node server.js &
          SERVER_PID=$!

          echo "Waiting up to ${READY_TIMEOUT_SECONDS}s for server to become ready…"

          # Poll /health every 0.5 s until ready or timeout expires.
          READY=0
          DEADLINE=$(( $(date +%s) + READY_TIMEOUT_SECONDS ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            if curl -sf http://localhost:3000/health -o /dev/null 2>/dev/null; then
              READY=1
              break
            fi
            sleep 0.5
          done

          # Gracefully shut down before checking the result.
          kill "$SERVER_PID"
          # Use || to prevent bash -e from aborting when wait returns the
          # expected non-zero SIGTERM exit code (143).
          EXIT_CODE=0
          wait "$SERVER_PID" 2>/dev/null || EXIT_CODE=$?

          # SIGTERM produces exit code 143 (128+15) — that is expected and fine.
          # Any other non-zero code indicates a crash.
          if [ "$READY" -eq 0 ]; then
            echo "ERROR: server did not become ready within ${READY_TIMEOUT_SECONDS} s"
            exit 1
          fi
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 143 ]; then
            echo "ERROR: server exited with unexpected code $EXIT_CODE"
            exit 1
          fi
          echo "Server smoke-test passed (exit code $EXIT_CODE)"
