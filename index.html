<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Godbound TTRPG Toolkit – Dice roller, combat tracker and character sheet for the Godbound tabletop RPG.">
  <title>Godbound Toolkit</title>
  <link rel="stylesheet" href="css/styles.css">
  <script>/* Apply saved theme immediately to prevent flash-of-wrong-theme */
  (function(){var v=['dark-fantasy','high-fantasy','retro-terminal','sci-fi'];var t=localStorage.getItem('godbound_theme');document.documentElement.setAttribute('data-theme',v.indexOf(t)!==-1?t:'dark-fantasy');}());</script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       Application Header & Tab Navigation
  ════════════════════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="app-logo">
      ⚡ Godbound Toolkit <span>TTRPG companion</span>
    </div>

    <nav class="tab-nav" role="navigation" aria-label="Main sections">
      <button class="tab-btn" data-tab="dice-tab"       aria-controls="dice-tab">🎲 Dice Roller</button>
      <button class="tab-btn" data-tab="combat-tab"     aria-controls="combat-tab">⚔️ Combat</button>
      <button class="tab-btn" data-tab="character-tab"  aria-controls="character-tab">📜 Character</button>
      <button class="tab-btn" data-tab="dataeditor-tab" aria-controls="dataeditor-tab">🗂️ Data Editor</button>
    </nav>

    <div class="header-actions" role="group" aria-label="Data management">
      <select id="theme-select" class="theme-select" aria-label="Select visual theme" title="Switch visual theme">
        <option value="dark-fantasy">⚔️ Dark Fantasy</option>
        <option value="high-fantasy">🌿 High Fantasy</option>
        <option value="retro-terminal">💻 Retro Terminal</option>
        <option value="sci-fi">🚀 Sci-Fi</option>
      </select>
      <button id="export-btn" class="btn-header-action" title="Export all data to a JSON file">
        📤 Export
      </button>
      <button id="import-btn" class="btn-header-action" title="Import data from a JSON file (merge or replace)">
        📥 Import
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════
       Main Content – Tabs
  ════════════════════════════════════════════════════════════ -->
  <main>

    <!-- ── Dice Roller Tab ──────────────────────────────── -->
    <section id="dice-tab" class="tab-content" role="tabpanel" aria-label="Dice Roller">
      <!-- Content injected by GoDice.render() -->
    </section>

    <!-- ── Combat Tracker Tab ───────────────────────────── -->
    <section id="combat-tab" class="tab-content" role="tabpanel" aria-label="Combat Tracker">
      <!-- Content injected by GoCombat.render() -->
    </section>

    <!-- ── Character Sheet Tab ──────────────────────────── -->
    <section id="character-tab" class="tab-content" role="tabpanel" aria-label="Character Sheet">
      <!-- Content injected by GoCharacter.render() -->
    </section>

    <!-- ── Data Editor Tab ──────────────────────────────── -->
    <section id="dataeditor-tab" class="tab-content" role="tabpanel" aria-label="Data Editor">
      <!-- Content injected by GoDataEditor.render() -->
    </section>

  </main>

  <!-- Toast notification container (injected by GoApp.toast) -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ═══════════════════════════════════════════════════════
       Scripts – loaded in dependency order
  ════════════════════════════════════════════════════════════ -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/importexport.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/character.js"></script>
  <script src="js/dataeditor.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
